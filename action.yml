name: "GitHub Stats Creator"
description: "Generate SVG stats cards from GitHub commit history and push to your repo"
author: "marttp"

branding:
  icon: bar-chart-2
  color: green

inputs:
  github_user_name:
    description: "GitHub username to generate stats for. Defaults to the repository owner."
    required: false
    default: ""
  github_token:
    description: "GitHub token (PAT or GITHUB_TOKEN). Needs read:user scope."
    required: true
    default: ${{ github.token }}
  card_type:
    description: "Card type to generate: stats, top-langs, contribution-graph"
    required: false
    default: "stats"
  theme:
    description: "Theme: default, dark, radical, gruvbox, tokyonight, onedark, dracula, monokai, nord, highcontrast"
    required: false
    default: "default"
  output_path:
    description: "Output file path for the generated SVG"
    required: false
    default: "gh-stats.svg"
  commit_message:
    description: "Git commit message when pushing the SVG"
    required: false
    default: "Update GitHub stats SVG [skip ci]"
  show_icons:
    description: "Show icons on the stats card"
    required: false
    default: "true"
  hide_rank:
    description: "Hide the rank circle on the stats card"
    required: false
    default: "false"
  include_all_commits:
    description: "Include all-time commits (uses REST API search, may be slower)"
    required: false
    default: "false"
  langs_count:
    description: "Number of languages to show on top-langs card"
    required: false
    default: "5"

outputs:
  svg_path:
    description: "Path to the generated SVG file"

runs:
  using: node20
  main: dist/index.js
